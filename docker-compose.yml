services:
  nginx:
    image: nginx:1.27-alpine
    ports: ["18723:80"]        # ブラウザ → http://localhost:18723
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [php]

  php:
    build: ./docker/php
    volumes:
      - ./:/var/www/html
    depends_on: [db]

  db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bbs
      MYSQL_USER: bbs
      MYSQL_PASSWORD: bbs
    ports: ["13306:3306"]      # 外部DBクライアント → localhost:13306
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
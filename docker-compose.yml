services:
  nginx:
    image: nginx:1.27-alpine
    ports: ["${NGINX_PORT}:80"]        # ブラウザ → http://localhost:${NGINX_PORT}
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [php]

  php:
    build: ./docker/php
    environment:
      APP_ENV: ${APP_ENV}
      APP_URL: ${APP_URL}
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./:/var/www/html
    depends_on: [db]

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports: ["${DB_PORT}:3306"]      # 外部DBクライアント → localhost:${DB_PORT}
    volumes:
      - dbdata:/var/lib/mysql
      # 初回起動（dbdataが空）時に連番SQLを自動適用
      - ./database/migrations:/docker-entrypoint-initdb.d:ro

volumes:
  dbdata:

name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: bbs
          MYSQL_USER: bbs
          MYSQL_PASSWORD: bbs
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      DB_HOST: 127.0.0.1
      DB_NAME: bbs
      DB_USER: bbs
      DB_PASSWORD: bbs
      RUN_DB_TESTS: '1'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, mbstring
          coverage: none

      - name: Validate composer
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Lint (php -l)
        run: find src tests bin -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

      - name: Run migrations
        run: php bin/migrate.php

      - name: PHPUnit (unit + integration)
        run: ./vendor/bin/phpunit
